<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #050505;
    --s1:      #0e0e0e;
    --s2:      #161616;
    --s3:      #202020;
    --border:  #1e1e1e;
    --green:   #00ff88;
    --orange:  #ff9500;
    --blue:    #0af;
    --red:     #ff3b55;
    --text:    #f0f0f0;
    --muted:   #888;
    --dim:     #444;
    --dimmer:  #2a2a2a;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:var(--bg);
    color:var(--text);
    font-family:'Noto Sans JP',sans-serif;
    min-height:100vh;
    max-width:430px;
    margin:0 auto;
    padding-bottom:60px;
  }
  /* HEADER */
  .hdr {
    padding:44px 18px 20px;
    background:var(--s1);
    border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:10;
  }
  .hdr-top {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:20px;
  }
  .app-label {
    font-family:'Space Grotesk',sans-serif;
    font-size:10px; letter-spacing:.3em; color:var(--dim);
    text-transform:uppercase; margin-bottom:4px;
  }
  .app-title { font-size:19px; font-weight:900; letter-spacing:-.02em; }
  .time-box {
    background:var(--s2); border:1px solid var(--border);
    border-radius:10px; padding:8px 12px; text-align:right;
  }
  .time-label { font-family:'Space Grotesk',monospace; font-size:9px; color:var(--dimmer); letter-spacing:.2em; margin-bottom:3px; }
  .time-val   { font-family:'Space Grotesk',monospace; font-size:13px; color:var(--muted); }

  /* TOTAL CARD */
  .total-card {
    background:var(--s2); border:1px solid var(--border);
    border-radius:16px; padding:18px 18px 16px; margin-bottom:12px;
  }
  .total-tag { font-family:'Space Grotesk',monospace; font-size:9px; letter-spacing:.25em; color:var(--dimmer); margin-bottom:8px; }
  .total-row { display:flex; align-items:baseline; gap:4px; margin-bottom:2px; }
  .total-yen { font-family:'Space Grotesk',monospace; font-size:20px; color:var(--dim); }
  .total-num { font-family:'Space Grotesk',monospace; font-size:40px; font-weight:700; letter-spacing:-.03em; line-height:1; }
  /* alloc bar */
  .alloc-bar { display:flex; height:5px; border-radius:3px; overflow:hidden; gap:2px; margin-top:14px; }
  .alloc-seg { border-radius:2px; transition:width .6s ease; }
  .alloc-legend { display:flex; gap:14px; margin-top:8px; }
  .alloc-dot { width:6px; height:6px; border-radius:2px; }
  .alloc-item { display:flex; align-items:center; gap:5px; font-family:'Space Grotesk',monospace; font-size:10px; color:var(--dim); }

  /* SUMMARY GRID */
  .summary { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
  .sum-card {
    background:var(--s2); border:1px solid var(--border);
    border-radius:12px; padding:11px 10px 10px;
    border-top-width:2px; border-top-style:solid;
  }
  .sum-label { font-size:10px; color:var(--dim); margin-bottom:5px; }
  .sum-val { font-family:'Space Grotesk',monospace; font-size:12px; font-weight:600; color:#d8d8d8; }

  /* REFRESH */
  .refresh-btn {
    width:100%; background:var(--s2);
    border:1px solid rgba(0,255,136,.2);
    color:var(--green); font-family:'Space Grotesk',monospace;
    font-size:13px; padding:13px; border-radius:12px;
    cursor:pointer; display:flex; align-items:center;
    justify-content:center; gap:8px; letter-spacing:.05em;
    margin-bottom:8px; transition:background .2s;
  }
  .refresh-btn:active { background:rgba(0,255,136,.08); }
  .refresh-btn:disabled { opacity:.4; cursor:not-allowed; }
  .spin { display:inline-block; font-size:16px; }
  .spinning { animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .status {
    font-family:'Space Grotesk',monospace; font-size:11px;
    text-align:center; min-height:16px; transition:color .3s;
  }

  /* SECTIONS */
  .sections { padding:16px 14px 0; }
  .section { background:var(--s1); border:1px solid var(--border); border-radius:18px; overflow:hidden; margin-bottom:12px; }
  .sec-hdr {
    display:flex; justify-content:space-between; align-items:center;
    padding:13px 16px; border-bottom:1px solid var(--s2);
  }
  .sec-left { display:flex; align-items:center; gap:8px; }
  .sec-bar  { width:3px; height:14px; border-radius:2px; }
  .sec-title { font-family:'Space Grotesk',monospace; font-size:10px; letter-spacing:.25em; color:var(--muted); text-transform:uppercase; }
  .sec-total { font-family:'Space Grotesk',monospace; font-size:15px; font-weight:600; color:var(--text); }

  /* ROWS */
  .row {
    display:flex; align-items:center; gap:12px;
    padding:14px 16px; border-bottom:1px solid var(--s2);
  }
  .row:last-child { border-bottom:none; }
  .coin-icon {
    width:46px; height:46px; border-radius:12px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk',monospace; font-size:18px; font-weight:700;
  }
  .row-mid { flex:1; min-width:0; }
  .row-sym { font-family:'Space Grotesk',monospace; font-size:16px; font-weight:700; color:var(--text); }
  .row-name { font-size:11px; color:var(--dim); margin-top:2px; }
  .row-unit {
    margin-top:7px; display:inline-flex; align-items:center;
    background:var(--s2); border:1px solid var(--s3);
    border-radius:7px; padding:5px 10px; gap:6px;
  }
  .unit-price { font-family:'Space Grotesk',monospace; font-size:13px; color:var(--muted); }
  .unit-x     { font-family:'Space Grotesk',monospace; font-size:11px; color:var(--dimmer); }
  .unit-qty   { font-family:'Space Grotesk',monospace; font-size:13px; color:var(--muted); }
  .row-right  { text-align:right; flex-shrink:0; }
  .row-jpy    { font-family:'Space Grotesk',monospace; font-size:17px; font-weight:700; color:var(--text); }
  .badge {
    display:inline-block; font-family:'Space Grotesk',monospace;
    font-size:11px; font-weight:700; padding:3px 7px;
    border-radius:5px; margin-top:5px;
  }
  .badge-up   { background:rgba(0,255,136,.12); color:var(--green); }
  .badge-down { background:rgba(255,59,85,.12);  color:var(--red);   }

  .nvda-sub { padding:6px 16px 10px; font-family:'Space Grotesk',monospace; font-size:11px; color:var(--dimmer); }

  footer { text-align:center; padding:28px 0 0; font-family:'Space Grotesk',monospace; font-size:10px; color:#222; line-height:2.2; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="app-label">Portfolio</div>
      <div class="app-title">資産ダッシュボード</div>
    </div>
    <div class="time-box">
      <div class="time-label">UPDATED</div>
      <div class="time-val" id="timeVal">--:--</div>
    </div>
  </div>

  <!-- 総資産 -->
  <div class="total-card">
    <div class="total-tag">TOTAL ASSETS</div>
    <div class="total-row">
      <span class="total-yen">¥</span>
      <span class="total-num" id="totalNum">---</span>
    </div>
    <div class="alloc-bar" id="allocBar">
      <div class="alloc-seg" style="width:33%;background:#00ff88"></div>
      <div class="alloc-seg" style="width:34%;background:#ff9500"></div>
      <div class="alloc-seg" style="width:33%;background:#0af"></div>
    </div>
    <div class="alloc-legend">
      <div class="alloc-item"><div class="alloc-dot" style="background:#00ff88"></div>暗号資産 <span id="pctCrypto">--%</span></div>
      <div class="alloc-item"><div class="alloc-dot" style="background:#ff9500"></div>日本株 <span id="pctJp">--%</span></div>
      <div class="alloc-item"><div class="alloc-dot" style="background:#0af"></div>米国株 <span id="pctUs">--%</span></div>
    </div>
  </div>

  <!-- サマリ -->
  <div class="summary">
    <div class="sum-card" style="border-top-color:#00ff88">
      <div class="sum-label">暗号資産</div>
      <div class="sum-val" id="sumCrypto">---</div>
    </div>
    <div class="sum-card" style="border-top-color:#ff9500">
      <div class="sum-label">日本株</div>
      <div class="sum-val" id="sumJp">---</div>
    </div>
    <div class="sum-card" style="border-top-color:#0af">
      <div class="sum-label">米国株</div>
      <div class="sum-val" id="sumUs">---</div>
    </div>
  </div>

  <button class="refresh-btn" id="refreshBtn" onclick="fetchAll()">
    <span class="spin" id="spinIcon">↻</span>
    <span id="btnLabel">価格を更新</span>
  </button>
  <div class="status" id="status">起動中...</div>
</div>

<!-- ASSETS -->
<div class="sections">

  <!-- 暗号資産 -->
  <div class="section">
    <div class="sec-hdr">
      <div class="sec-left">
        <div class="sec-bar" style="background:#00ff88"></div>
        <span class="sec-title">暗号資産</span>
      </div>
      <span class="sec-total" id="secCrypto">---</span>
    </div>
    <div id="cryptoRows"></div>
  </div>

  <!-- 日本株 -->
  <div class="section">
    <div class="sec-hdr">
      <div class="sec-left">
        <div class="sec-bar" style="background:#ff9500"></div>
        <span class="sec-title">日本株 / NISA</span>
      </div>
      <span class="sec-total" id="secJp">---</span>
    </div>
    <div id="jpRows"></div>
  </div>

  <!-- 米国株 -->
  <div class="section">
    <div class="sec-hdr">
      <div class="sec-left">
        <div class="sec-bar" style="background:#0af"></div>
        <span class="sec-title">米国株 / NISA</span>
      </div>
      <span class="sec-total" id="secUs">---</span>
    </div>
    <div id="usRows"></div>
    <div class="nvda-sub" id="nvdaSub"></div>
  </div>

</div>

<footer>CoinGecko · Frankfurter · Yahoo Finance<br>投資は自己責任でどうぞ 🙏</footer>

<script>
const CRYPTO = [
  { sym:"BTC",  name:"Bitcoin",  qty:0.00773847, icon:"₿", color:"#F7931A", bg:"rgba(247,147,26,0.15)", id:"bitcoin"      },
  { sym:"SOL",  name:"Solana",   qty:5.91583696, icon:"◎", color:"#9945FF", bg:"rgba(153,69,255,0.15)", id:"solana"       },
  { sym:"XRP",  name:"XRP",      qty:118.32089,  icon:"✕", color:"#00A3E0", bg:"rgba(0,163,224,0.15)",  id:"ripple"       },
  { sym:"ETH",  name:"Ethereum", qty:0.1,        icon:"Ξ", color:"#627EEA", bg:"rgba(98,126,234,0.15)", id:"ethereum"     },
  { sym:"RNDR", name:"Render",   qty:249.35877,  icon:"R", color:"#FF4D4D", bg:"rgba(255,77,77,0.15)",  id:"render-token" },
  { sym:"SUI",  name:"Sui",      qty:60.85292,   icon:"◈", color:"#4DA2FF", bg:"rgba(77,162,255,0.15)", id:"sui"          },
];
const JP = [
  { sym:"VRAIN",          name:"ＶＲＡＩＮ",  code:"135A", qty:8,  px:3865  },
  { sym:"フジクラ",       name:"Fujikura",     code:"5803", qty:2,  px:4747  },
  { sym:"アドバンテスト", name:"Advantest",    code:"6857", qty:8,  px:26765 },
  { sym:"三菱重工",       name:"MHI",          code:"7011", qty:43, px:3790  },
];

const fmt = n => "¥" + Math.round(n).toLocaleString("ja-JP");
const fmtQ = (qty, sym) => {
  if (sym==="BTC"||sym==="ETH") return qty.toFixed(5);
  if (qty < 1) return qty.toFixed(5);
  return Number.isInteger(qty) ? qty.toLocaleString() : qty.toFixed(3);
};

function row(icon, color, bg, sym, name, unitStr, qtyStr, jpy, pct) {
  const badgeHtml = pct != null
    ? `<span class="badge ${pct>=0?'badge-up':'badge-down'}">${pct>=0?'▲':'▼'} ${Math.abs(pct).toFixed(2)}%</span>`
    : '';
  return `
  <div class="row">
    <div class="coin-icon" style="background:${bg};color:${color};border:1px solid ${color}40">${icon}</div>
    <div class="row-mid">
      <div class="row-sym">${sym}</div>
      <div class="row-name">${name}</div>
      <div class="row-unit">
        <span class="unit-price">${unitStr}</span>
        <span class="unit-x">×</span>
        <span class="unit-qty">${qtyStr}</span>
      </div>
    </div>
    <div class="row-right">
      <div class="row-jpy">${fmt(jpy)}</div>
      ${badgeHtml}
    </div>
  </div>`;
}

function setStatus(msg, color="#555") {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.style.color = color;
}

async function fetchAll() {
  const btn = document.getElementById("refreshBtn");
  const ico = document.getElementById("spinIcon");
  const lbl = document.getElementById("btnLabel");
  btn.disabled = true;
  ico.classList.add("spinning");
  lbl.textContent = "取得中...";

  let cryptoPrices = null;
  let usdJpy = 159;
  let nvdaUsd = 205, nvdaChg = null;

  // ── 1. 暗号資産（CoinGecko 直接）──
  setStatus("🔍 暗号資産を取得中...", "#555");
  const ids = CRYPTO.map(c=>c.id).join(",");
  try {
    const r = await fetch(
      `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=jpy&include_24hr_change=true`,
      { signal: AbortSignal.timeout(10000) }
    );
    if (r.ok) {
      cryptoPrices = await r.json();
      setStatus("✓ 暗号資産 取得完了", "#00cc66");
    }
  } catch {}

  // ── 2. USD/JPY（Frankfurter 直接）──
  try {
    const r = await fetch("https://api.frankfurter.app/latest?from=USD&to=JPY", { signal: AbortSignal.timeout(5000) });
    if (r.ok) { const d = await r.json(); if (d.rates?.JPY) usdJpy = d.rates.JPY; }
  } catch {}

  // ── 3. NVDA（Yahoo Finance 直接）──
  try {
    const r = await fetch(
      "https://query1.finance.yahoo.com/v8/finance/chart/NVDA?interval=1d&range=1d",
      { signal: AbortSignal.timeout(8000) }
    );
    if (r.ok) {
      const d = await r.json();
      const meta = d?.chart?.result?.[0]?.meta;
      if (meta?.regularMarketPrice) {
        nvdaUsd = meta.regularMarketPrice;
        const prev = meta.previousClose || meta.chartPreviousClose;
        if (prev) nvdaChg = ((nvdaUsd - prev) / prev) * 100;
      }
    }
  } catch {}

  // ── 描画 ──
  const cryptoItems = CRYPTO.map(c => {
    const p = cryptoPrices?.[c.id];
    const unitJpy = p?.jpy ?? 0;
    return { ...c, unitJpy, jpy: unitJpy * c.qty, chg: p?.jpy_24h_change ?? null };
  });
  const jpItems  = JP.map(s => ({ ...s, jpy: s.px * s.qty }));
  const nvdaJpy  = nvdaUsd * usdJpy * 15;
  const cryptoSum = cryptoItems.reduce((a,c)=>a+c.jpy, 0);
  const jpSum     = jpItems.reduce((a,s)=>a+s.jpy, 0);
  const grand     = cryptoSum + jpSum + nvdaJpy;
  const total     = grand || 1;

  // 暗号資産
  document.getElementById("cryptoRows").innerHTML =
    cryptoItems.map(c => row(c.icon, c.color, c.bg, c.sym, c.name,
      c.unitJpy ? fmt(c.unitJpy) : "---", fmtQ(c.qty, c.sym), c.jpy, c.chg)).join("");

  // 日本株
  document.getElementById("jpRows").innerHTML =
    jpItems.map(s => row("株","#FF9900","rgba(255,149,0,0.15)",
      s.sym, `${s.name} · ${s.code}`, fmt(s.px), `${s.qty}株`, s.jpy, null)).join("");

  // 米国株
  document.getElementById("usRows").innerHTML =
    row("N","#00aaff","rgba(0,170,255,0.15)",
      "NVDA","NVIDIA Corporation", `$${nvdaUsd.toFixed(2)}`, "15株", nvdaJpy, nvdaChg);
  document.getElementById("nvdaSub").textContent = `¥/USD: ${Math.round(usdJpy)} · 取得単価 $183.14`;

  // ヘッダー
  document.getElementById("totalNum").textContent = Math.round(grand).toLocaleString("ja-JP");
  document.getElementById("sumCrypto").textContent = fmt(cryptoSum);
  document.getElementById("sumJp").textContent     = fmt(jpSum);
  document.getElementById("sumUs").textContent     = fmt(nvdaJpy);
  document.getElementById("secCrypto").textContent = fmt(cryptoSum);
  document.getElementById("secJp").textContent     = fmt(jpSum);
  document.getElementById("secUs").textContent     = fmt(nvdaJpy);

  // 配分バー
  const cp = (cryptoSum/total)*100, jp2 = (jpSum/total)*100, up = (nvdaJpy/total)*100;
  document.getElementById("allocBar").innerHTML = `
    <div class="alloc-seg" style="width:${cp}%;background:#00ff88;min-width:${cp>0?4:0}px"></div>
    <div class="alloc-seg" style="width:${jp2}%;background:#ff9500;min-width:${jp2>0?4:0}px"></div>
    <div class="alloc-seg" style="width:${up}%;background:#0af;min-width:${up>0?4:0}px"></div>`;
  document.getElementById("pctCrypto").textContent = cp.toFixed(0) + "%";
  document.getElementById("pctJp").textContent     = jp2.toFixed(0) + "%";
  document.getElementById("pctUs").textContent     = up.toFixed(0) + "%";

  document.getElementById("timeVal").textContent =
    new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});

  setStatus(cryptoPrices ? "✓ 全データ更新完了" : "⚠ 暗号資産の取得失敗。更新を押してください", cryptoPrices?"#00cc66":"#ff6644");

  btn.disabled = false;
  ico.classList.remove("spinning");
  lbl.textContent = "価格を更新";
}

fetchAll();
setInterval(fetchAll, 120000);
</script>
</body>
</html>
